spack:

  config:
    deprecated: true

  include:

  # NOvA
  - git: https://github.com/novaexperiment/nova-release-configs
    branch: main
    paths:
    - included_yaml/nova-packages.yaml
    - included_yaml/nova-specs.yaml

  # Art
  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/gcc-12-toolchain.yaml
    - included_yaml/packages-art.yaml
    - included_yaml/specs-art.yaml

  # FIFE
  - git:  https://github.com/fnal-fife/fife-release-configs
    branch: main
    paths:
    - included_yaml/fife_packages.yaml

  specs:
    - $specs_nova
    - $specs_art

  upstreams:
    cvmfs-larsoft:
      install_tree: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.0/spack_env/opt/spack

  concretizer:
    unify: true
    reuse:
      from:
      - type: environment
        path: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.0/spack_env/var/spack/environments/larsoft-v10_11_01-unified-cuda-python-3_9-trimmed

  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=17
      target:
      - x86_64_v3
